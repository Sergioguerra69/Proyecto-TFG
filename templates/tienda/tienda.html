{% extends 'base.html' %}

{% block title %}Tienda - VetCT{% endblock %}

{% block content %}
<!-- Cabecera de la página -->
<section class="py-20 bg-gradient-to-br from-green-50 via-white to-cyan-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
            <div class="text-center lg:text-left">
                <div class="inline-flex items-center justify-center mb-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-cyan-600 rounded-xl flex items-center justify-center mr-4 shadow-lg">
                        <i class="fas fa-store text-white text-xl"></i>
                    </div>
                    <h1 class="font-montserrat font-black text-4xl md:text-5xl text-gray-900">Catálogo de Productos</h1>
                </div>
                <p class="text-xl text-gray-600 max-w-2xl">Gestión de suministros y productos veterinarios de alta calidad para tu mascota</p>
            </div>
            <div class="flex gap-3">
                <a href="/tienda/nuevo_producto/" class="bg-gradient-to-r from-green-500 to-cyan-600 text-white font-bold py-3 px-6 rounded-xl hover:from-green-600 hover:to-cyan-700 transition-all duration-300 shadow-lg hover:shadow-xl inline-flex items-center">
                                        Nuevo Producto
                </a>
            </div>
        </div>
    </div>
</section>

<!-- Productos cargados desde la API -->
<section class="py-16 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Aquí se cargan los productos con JavaScript -->
        <div id="lista-productos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12">
                <div class="bg-blue-50 border-l-4 border-cyan-400 p-6 rounded-lg max-w-md mx-auto">
                                        <div class="font-bold text-gray-900 mb-2">Cargando productos...</div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- JavaScript para cargar productos desde la API -->
<script>
// Funcion para cargar productos desde la API
function cargarProductos() {
    // Hacemos la peticion a la API
    fetch('/api/productos/')
        .then(function(respuesta) {
            return respuesta.json();
        })
        .then(function(productos) {
            var contenedor = document.getElementById('lista-productos');
            
            // Si no hay productos
            if (productos.length === 0) {
                contenedor.innerHTML = 
                    '<div class="col-span-full text-center py-12">' +
                        '<div class="bg-blue-50 border-l-4 border-cyan-400 p-6 rounded-lg max-w-md mx-auto">' +
                            '' +
                            '<div class="font-bold text-gray-900 mb-2">Sin productos</div>' +
                            '<div class="text-gray-600 text-sm">No hay productos disponibles por ahora.</div>' +
                        '</div>' +
                    '</div>';
                return;
            }
            
            // Creamos el HTML para cada producto
            var html = '';
            for (var i = 0; i < productos.length; i++) {
                var p = productos[i];
                var imagenHtml;
                
                // Si tiene imagen, la mostramos
                if (p.imagen) {
                    imagenHtml = '<img src="' + p.imagen + '" alt="' + p.nombre + '" class="w-full h-48 object-cover border-b border-gray-100">';
                } else {
                    imagenHtml = '<div class="w-full h-48 bg-gray-50 flex items-center justify-center border-b border-gray-100">' +
                        '<div class="w-16 h-16 bg-gray-200 rounded-2xl flex items-center justify-center">' +
                            '' +
                        '</div>' +
                    '</div>';
                }
                
                html = html + 
                    '<div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 group">' +
                        imagenHtml +
                        '<div class="p-6">' +
                            '<h3 class="font-montserrat font-extrabold text-lg text-gray-900 mb-3">' + p.nombre + '</h3>' +
                            '<div class="mb-4">' +
                                '<p class="text-2xl font-bold text-green-600">' + p.precio + ' €</p>' +
                                '<p class="text-sm text-gray-500">Stock: ' + p.stock + ' unidades</p>' +
                            '</div>' +
                            '<button class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:from-cyan-600 hover:to-blue-700 transition-all duration-300 shadow-lg hover:shadow-xl flex items-center justify-center">' +
                                '' +
                                'Añadir al Carro' +
                            '</button>' +
                        '</div>' +
                    '</div>';
            }
            
            contenedor.innerHTML = html;
        })
        .catch(function(error) {
            console.log('Error al cargar productos:', error);
            document.getElementById('lista-productos').innerHTML = 
                '<div class="col-span-full text-center py-12">' +
                    '<div class="bg-red-50 border-l-4 border-red-400 p-6 rounded-lg max-w-md mx-auto">' +
                        '<i class="fas fa-exclamation-circle text-red-500 text-3xl mb-3"></i>' +
                        '<div class="font-bold text-gray-900 mb-2">Error al cargar</div>' +
                        '<div class="text-gray-600 text-sm">No se pudieron cargar los productos.</div>' +
                    '</div>' +
                '</div>';
        });
}

// Cargar productos al entrar en la pagina
cargarProductos();
</script>

<!-- Filtros de búsqueda -->
<section class="py-8 bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <h3 class="font-montserrat font-extrabold text-2xl text-gray-900 mb-6">Filtrar Productos</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Categoría</label>
                    <select class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all duration-300">
                        <option>Todas las categorías</option>
                        <option>Medicamentos</option>
                        <option>Alimentos</option>
                        <option>Accesorios</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Rango de Precio</label>
                    <select class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all duration-300">
                        <option>Cualquier precio</option>
                        <option>0 - 10 €</option>
                        <option>10 - 25 €</option>
                        <option>25 - 50 €</option>
                        <option>Más de 50 €</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Disponibilidad</label>
                    <select class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all duration-300">
                        <option>Mostrar todos</option>
                        <option>Solo disponibles</option>
                        <option>Solo agotados</option>
                    </select>
                </div>
            </div>
            <button class="w-full md:w-auto bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold py-3 px-8 rounded-xl hover:from-cyan-600 hover:to-blue-700 transition-all duration-300 shadow-lg hover:shadow-xl">
                                Aplicar Filtros
            </button>
        </div>
    </div>
</section>
{% endblock %}
