{% extends 'base.html' %}

{% block title %}Nuevo Producto - VetCT{% endblock %}

{% block content %}
<!-- Formulario para crear producto -->
<section class="py-16 bg-gradient-to-br from-green-50 via-white to-cyan-50 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Titulo -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center mb-4">
                <div class="w-12 h-12 bg-gradient-to-br from-green-500 to-cyan-600 rounded-xl flex items-center justify-center mr-4 shadow-lg">
                    <i class="fas fa-plus text-white text-xl"></i>
                </div>
                <h1 class="font-montserrat font-black text-3xl text-gray-900">Nuevo Producto</h1>
            </div>
            <p class="text-gray-600">Añade un producto a la tienda</p>
        </div>

        <!-- Formulario -->
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <!-- Nombre -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre del producto</label>
                    <input type="text" name="nombre" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300"
                           placeholder="Ej: Pienso para perros">
                </div>

                <!-- Precio -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Precio (€)</label>
                    <input type="number" name="precio" step="0.01" min="0" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300"
                           placeholder="Ej: 25.99">
                </div>

                <!-- Stock -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Stock (unidades)</label>
                    <input type="number" name="stock" min="0" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300"
                           placeholder="Ej: 50">
                </div>

                <!-- Imagen -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Imagen del producto</label>
                    <input type="file" name="imagen" accept="image/*"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300">
                    <p class="text-xs text-gray-500 mt-1">Opcional. Formatos: JPG, PNG</p>
                </div>

                <!-- Botones -->
                <div class="flex gap-4">
                    <a href="{% url 'tienda' %}" 
                       class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-xl text-center transition-all duration-300">
                        Cancelar
                    </a>
                    <button type="submit" 
                            class="flex-1 bg-gradient-to-r from-green-500 to-cyan-600 hover:from-green-600 hover:to-cyan-700 text-white font-bold py-3 px-6 rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl">
                        <i class="fas fa-save mr-2"></i>
                        Guardar Producto
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
